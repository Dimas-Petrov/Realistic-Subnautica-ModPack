<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добро пожаловать на сайт!</title>
    <style>
        /* Сброс отступов */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        /* Контейнер заставки */
        .splash-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        /* Фоновое видео */
        .splash-video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 1;
        }
        /* Затемняющий слой */
        .splash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 2;
            transition: background-color 0.3s ease;
        }
        /* Текст и кнопка */
        .splash-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            z-index: 3;
            transition: opacity 0.3s ease;
        }
        .splash-title {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
        }
        .splash-subtitle {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-shadow: 1px 1px 6px rgba(0,0,0,0.6);
        }
        .splash-button {
            display: inline-block;
            padding: 15px 30px;
            background-color: transparent;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            text-transform: uppercase;
            border: 2px solid #fff;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .splash-button:hover {
            background-color: #fff;
            color: #000;
        }
        /* Эффект при наведении */
        .splash-container:has(.splash-button:hover) .splash-overlay {
            background-color: rgba(0, 0, 0, 0);
        }
        .splash-container:has(.splash-button:hover) .splash-content {
            opacity: 0;
        }
        .splash-container:has(.splash-button:hover) .splash-button {
            opacity: 0;
        }
        /* Адаптив для мобильных */
        @media (max-width: 768px) {
            .splash-title {
                font-size: 2.5rem;
            }
            .splash-subtitle {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <video class="splash-video" autoplay muted loop playsinline>
            <source src="assets/webm/background.webm" type="video/webm">
            Ваш браузер не поддерживает видео.
        </video>
        <div class="splash-overlay"></div>
        <div class="splash-content">
            <h1 class="splash-title">Добро пожаловать!</h1>
            <p class="splash-subtitle">Ваше потрясающее приветствие здесь.</p>
            <a href="home/" class="splash-button">Войти на сайт</a>
        </div>
    </div>
</body>
</html>
