site_name: Realistic Subnautica ModPack
site_url: https://dimas-petrov.github.io/Realistic-Subnautica-ModPack/
theme:
  name: material
  language: ru

# Навигация (меню)
nav:
  - Главная: index.md
  - Установка: Installation.md
  - ЧаВо: faq.md

# Расширения Markdown (должны быть на верхнем уровне, а не внутри nav)
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html