nav:
  - Главная: index.md
  - Установка: Installation.md
  - ЧаВо: faq.md

markdown_extensions:
  - admonition # Красивые блоки "Важно", "Подсказка"
  - pymdownx.details # Сворачиваемые блоки
  - pymdownx.superfences # Расширенные возможности для кода
  - pymdownx.tabbed: # Контент в виде вкладок
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html