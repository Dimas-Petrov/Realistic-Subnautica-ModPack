site_name: Realistic Subnautica ModPack # ← Название вашего сайта
site_url: https://dimas-petrov.github.io/Realistic-Subnautica-ModPack/

theme:
  name: material
  language: ru
  palette:

    # Светлая тема
    - scheme: default
      primary: blue
      accent: light-blue
      toggle:
        icon: material/weather-sunny
        name: Светлая тема

    # Тёмная тема (стандартная)
    # - scheme: slate
    #   primary: blue
    #   accent: light-blue
    #   toggle:
    #     icon: material/weather-night
    #     name: Тёмная тема

    # AMOLED-тема (максимально тёмная встроенными средствами)
    - scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/weather-night
        name: Тёмная тема
